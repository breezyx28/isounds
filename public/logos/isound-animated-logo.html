<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iSound Logo Animation</title>
    <style>
        :root {
            /* Brand Colors based on the provided image */
            --brand-blue: #09689b;
            --bg-color: #050505;
            --text-light: #f5f5f7;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
        }

        .logo-container {
            width: 250px;
            height: 250px;
            position: relative;
            cursor: pointer;
            /* Container scales slightly on hover for interactivity */
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-container:hover {
            transform: scale(1.05);
        }

        .isound-logo {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* SVG Element Styling */
        .logo-fill {
            fill: var(--brand-blue);
        }

        .logo-stroke {
            stroke: var(--brand-blue);
            stroke-width: 13;
            stroke-linecap: round;
            fill: none;
        }

        /* Initial states before animation */
        .body-shape, .head-shape, .inner-wave, .outer-wave, .brand-text {
            opacity: 0;
        }

        /* --- Keyframes --- */
        
        /* 1. Body fading and sliding up */
        @keyframes revealBody {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 2. Head (dot) popping in */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0); }
            60% { opacity: 1; transform: scale(1.15); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 3. Drawing the wave arcs */
        @keyframes drawWave {
            to { stroke-dashoffset: 0; opacity: 1; }
        }

        /* 4. Continuous pulsing representing sound/audio */
        @keyframes pulseAudio {
            0% { transform: scale(0.98); opacity: 0.8; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(0.98); opacity: 0.8; }
        }

        /* 5. Text fade in */
        @keyframes fadeInText {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Animation Assignments & Timing --- */

        .body-shape {
            animation: revealBody 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s forwards;
            transform-origin: 100px 150px;
        }

        .head-shape {
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.7s forwards;
            transform-origin: 100px 85px;
        }

        .inner-wave {
            /* Stroke dasharray sets the gap, offset hides it initially */
            stroke-dasharray: 215; 
            stroke-dashoffset: 215;
            transform-origin: 100px 85px;
            /* Draws first, then goes into infinite pulse loop */
            animation: 
                drawWave 1.2s cubic-bezier(0.4, 0, 0.2, 1) 1.2s forwards,
                pulseAudio 3s ease-in-out 2.4s infinite;
        }

        .outer-wave {
            stroke-dasharray: 360; 
            stroke-dashoffset: 360;
            transform-origin: 100px 85px;
            /* Draws slightly after the inner wave for a ripple effect */
            animation: 
                drawWave 1.4s cubic-bezier(0.4, 0, 0.2, 1) 1.5s forwards,
                pulseAudio 3s ease-in-out 2.7s infinite;
        }

        /* Hover states to speed up the audio pulse (interactive feel) */
        .logo-container:hover .inner-wave,
        .logo-container:hover .outer-wave {
            animation-duration: 1.2s, 1s; /* Speeds up the infinite pulse loop */
        }

        /* Brand Typography */
        .brand-text {
            margin-top: 30px;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-light);
            transform: translateY(10px);
            animation: fadeInText 1s ease 2s forwards;
            display: flex;
            align-items: baseline;
            user-select: none;
        }

        .brand-i {
            color: var(--brand-blue);
            font-size: 2.8rem;
            margin-right: 2px;
        }
    </style>
</head>
<body>

    <div class="logo-container" aria-label="iSound Animated Logo">
        <svg class="isound-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            
            <!-- Outer Wave -->
            <!-- Large Arc mapping from bottom-left to bottom-right, over the top -->
            <!-- Center: 100, 85 | Radius: 75 -->
            <path class="logo-stroke outer-wave" d="M 42.6 133.2 A 75 75 0 1 1 157.4 133.2" />

            <!-- Inner Wave -->
            <!-- Center: 100, 85 | Radius: 45 -->
            <path class="logo-stroke inner-wave" d="M 65.5 113.9 A 45 45 0 1 1 134.5 113.9" />

            <!-- 'i' Body Shape -->
            <!-- Custom bezier path carefully matching the tapered, rounded shoulders of the logo -->
            <path class="logo-fill body-shape" d="M 66 135 C 66 120, 80 118, 100 118 C 120 118, 134 120, 134 135 C 134 170, 120 195, 100 195 C 80 195, 66 170, 66 135 Z" />

            <!-- 'i' Head (Dot) -->
            <circle class="logo-fill head-shape" cx="100" cy="85" r="16.5" />
            
        </svg>
    </div>

    <!-- Accompanying Platform Name -->
    <div class="brand-text">
        <span class="brand-i">i</span>Sound
    </div>

</body>
</html>
