<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iSounds Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #08060f;
        color: #f5f5f5;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .card {
        width: min(540px, 90vw);
        border: 1px solid #2a2236;
        border-radius: 16px;
        background: #120d1d;
        padding: 24px;
        text-align: center;
      }
      p {
        line-height: 1.7;
        color: #d8d2e2;
      }
      a {
        display: inline-block;
        margin-top: 12px;
        color: #c084fc;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <img src="/logos/outlined-white.svg" alt="iSounds" width="120" />
      <h1>أنت غير متصل بالإنترنت</h1>
      <p>You're offline. Reconnect and try again to continue listening.</p>
      <a href="/">Try again</a>
    </section>
  </body>
</html>
